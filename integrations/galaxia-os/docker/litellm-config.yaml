model_list:
  # === 5 Ollama Models (local, free, auf Hetzner) ===

  # 1. Hauptmodell: Reasoning + Chat
  - model_name: qwen3-14b
    litellm_params:
      model: ollama/qwen3:14b
      api_base: http://host.docker.internal:11434
      timeout: 120

  # 2. Code-Spezialist
  - model_name: deepseek-coder-33b
    litellm_params:
      model: ollama/deepseek-coder:33b
      api_base: http://host.docker.internal:11434
      timeout: 180

  # 3. Schnelles Fallback
  - model_name: qwen3-8b
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://host.docker.internal:11434
      timeout: 60

  # 4. Allrounder
  - model_name: mistral-7b
    litellm_params:
      model: ollama/mistral:7b
      api_base: http://host.docker.internal:11434
      timeout: 60

  # 5. Kleines schnelles Modell fuer einfache Tasks
  - model_name: qwen3-4b
    litellm_params:
      model: ollama/qwen3:4b
      api_base: http://host.docker.internal:11434
      timeout: 30

  # === Cloud Models for Multi-Bot Testing ===

  # 6. Claude Haiku 4.5 (schnell, guenstig)
  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      timeout: 60

  # 7. GPT-4o-mini (kreativ, vielseitig)
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
      timeout: 60

  # 8. Claude Sonnet 4.6 (intelligent, gruendlich)
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      timeout: 120

  # 9. Llama 3.1 8B (lokal via Ollama, kostenlos)
  - model_name: llama-8b
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://host.docker.internal:11434
      timeout: 60

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
