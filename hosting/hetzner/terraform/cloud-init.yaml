#cloud-config
package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - ufw
  - fail2ban
  - unattended-upgrades
  - logrotate
  - htop
  - jq

runcmd:
  # Install Docker
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker

  # Install Docker Compose plugin
  - mkdir -p /usr/local/lib/docker/cli-plugins
  - curl -SL "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m)" -o /usr/local/lib/docker/cli-plugins/docker-compose
  - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

  # Configure UFW firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Configure fail2ban
  - systemctl enable fail2ban
  - systemctl start fail2ban

  # Configure unattended-upgrades for security patches
  - dpkg-reconfigure -plow unattended-upgrades

  # Create app directory
  - mkdir -p /opt/core
  - mkdir -p /opt/core/backups
  - mkdir -p /opt/core/ssl

  # Mount data volume if available
  - |
    if [ -b /dev/disk/by-id/scsi-0HC_Volume_* ]; then
      DEVICE=$(ls /dev/disk/by-id/scsi-0HC_Volume_* | head -1)
      mkdir -p /mnt/data
      if ! blkid "$DEVICE"; then
        mkfs.ext4 "$DEVICE"
      fi
      echo "$DEVICE /mnt/data ext4 defaults 0 2" >> /etc/fstab
      mount -a
      mkdir -p /mnt/data/postgres
      mkdir -p /mnt/data/neo4j
      mkdir -p /mnt/data/redis
      mkdir -p /mnt/data/backups
    fi

  # Harden SSH
  - sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/PermitRootLogin yes/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
  - systemctl restart sshd

  # Set kernel parameters for production
  - |
    cat >> /etc/sysctl.conf << 'SYSCTL'
    # Network performance
    net.core.somaxconn = 65535
    net.ipv4.tcp_max_syn_backlog = 65535
    net.ipv4.ip_local_port_range = 1024 65535
    # VM tuning
    vm.overcommit_memory = 1
    vm.swappiness = 10
    # File descriptors
    fs.file-max = 2097152
    SYSCTL
  - sysctl -p

  # Set up log rotation for Docker
  - |
    cat > /etc/docker/daemon.json << 'DOCKER_CONF'
    {
      "log-driver": "json-file",
      "log-opts": {
        "max-size": "20m",
        "max-file": "5"
      },
      "storage-driver": "overlay2"
    }
    DOCKER_CONF
  - systemctl restart docker

write_files:
  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
